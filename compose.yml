services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chiasm-frontend
    environment:
      - NODE_ENV=${APP_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - chiasm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chiasm-backend
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - chiasm-network

networks:   
  chiasm-network:
    driver: bridge
